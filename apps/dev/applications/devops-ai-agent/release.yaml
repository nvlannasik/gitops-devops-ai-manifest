apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devops-ai-agent
  namespace: flux-app
spec:
  chart:
    spec:
      version: 1.0.1
  values:
    image:
      tag: latest
    extraEnvVarsSecret: {}
    extraEnvVars:
      - name: NODE_ENV
        value: "dev"
      - name: PORT
        value: "3000"
      - name: LLM_PROVIDER
        value: "private-llm"
      - name: MCP_TRANSPORT
        value: "http"
      - name: MCP_HTTP_URL
        value: "http://devops-mcp-server.devops-tools:3000/mcp"
      - name: SQS_REQUEST_QUEUE_NAME
        value: "llm-request.fifo"
      - name: SQS_RESPONSE_QUEUE_NAME
        value: "llm-response.fifo"
      - name: SQS_REQUEST_DLQ_NAME
        value: "llm-request-dlq.fifo"
      - name: SQS_POLL_WAIT_SECONDS
        value: "20"
      - name: SQS_LLM_TIMEOUT_SECONDS
        value: "240"
      - name: MEMORY_BACKEND
        value: "redis"
      - name: REDIS_HOST
        value: "devops-agent-redis.devops-tools"
      - name: REDIS_PORT
        value: "6379"
      - name: REDIS_DB
        value: "0"
      - name: REDIS_TLS
        value: "false"
      - name: MAX_CONCURRENT_INVESTIGATIONS
        value: "5"
      - name: SLACK_ALERT_CHANNEL
        value: "C09R0F6F891"
      - name: SLACK_ONCALL_USERS
        value: "U03RCHDHUH5"
      - name: DB_HOST
        value: "postgresql.postgresql"
      - name: DB_PORT
        value: "5432"
      - name: MCP_AUTH_TOKEN
        value: "bIjIS4tu"
      - name: DB_USERNAME
        value: "postgres"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: devops-agent-secret
            key: DB_PASSWORD
      - name: DB_NAME
        value: "devops_agent"
      - name: DB_SSL_MODE
        value: "disable"
      - name: SLACK_BOT_TOKEN
        valueFrom:
          secretKeyRef:
            name: devops-agent-secret
            key: SLACK_BOT_TOKEN
      - name: SLACK_SIGNING_SECRET
        valueFrom:
          secretKeyRef:
            name: devops-agent-secret
            key: SLACK_SIGNING_SECRET
      - name: SLACK_APP_TOKEN
        valueFrom:
          secretKeyRef:
            name: devops-agent-secret
            key: SLACK_APP_TOKEN
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: devops-agent-secret
            key: REDIS_PASSWORD
      - name: AWS_TRUST_ANCHOR_ARN
        valueFrom:
          secretKeyRef:
            name: aws-rolesanywhere-config
            key: trust-anchor-arn
      - name: AWS_ROLESANYWHERE_PROFILE_ARN
        valueFrom:
          secretKeyRef:
            name: aws-rolesanywhere-config
            key: profile-arn
      - name: AWS_ROLE_ARN
        valueFrom:
          secretKeyRef:
            name: aws-rolesanywhere-config
            key: role-arn
      - name: CERT_PATH
        value: "/certs/tls.crt"
      - name: CERT_KEY_PATH
        value: "/certs/tls.key"
    secret:
      enabled: false
    extraVolumes:
      - name: workload-cert
        secret:
          secretName: workload-tls
    extraVolumeMounts:
      - name: workload-cert
        mountPath: /certs
        readOnly: true
    replicaCount: 1
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    loggingOperator:
      enabled: false
    secretStore:
      enabled: false
    resources: {}

