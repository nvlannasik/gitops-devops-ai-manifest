apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-mcp-server
rules:
  # CoreV1: namespaces, nodes (cluster-scoped)
  - apiGroups: [""]
    resources: ["namespaces", "nodes"]
    verbs: ["list", "get"]

  # CoreV1: namespace-scoped resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - events
      - persistentvolumeclaims
      - resourcequotas
      - serviceaccounts
      - configmaps
      - secrets
    verbs: ["list", "get"]

  # pod logs memerlukan subresource terpisah
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # apps: deployments, statefulsets, daemonsets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["list", "get"]

  # batch: jobs, cronjobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["list", "get"]

  # networking: ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list", "get"]

  # autoscaling: HPA
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["list", "get"]

  # CRD (cluster-scoped)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-mcp-server
subjects:
  - kind: ServiceAccount
    name: devops-mcp-server
    namespace: devops-tools
roleRef:
  kind: ClusterRole
  name: devops-mcp-server
  apiGroup: rbac.authorization.k8s.io
