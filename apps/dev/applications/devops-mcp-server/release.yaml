apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devops-mcp-server
  namespace: flux-app
spec:
  targetNamespace: devop-tools
  chart:
    spec:
      version: 1.0.1
  values:
    image:
      tag: latest
    extraEnvVars:
      - name: TRANSPORT
        value: "http"
      - name: NODE_ENV
        value: "prod"
      - name: PORT
        value: "3000"
      - name: MCP_TRANSPORT
        value: "http"
      - name: K8S_AUTH_MODE
        value: "incluster"
      - name: PROMETHEUS_URL
        value: "http://prometheus.monitoring.svc.cluster.local:9090"
      - name: LOKI_URL
        value: "http://loki.monitoring.svc.cluster.local:3100"  
    resources:
      limits:
        cpu: 256m
        memory: 512Mi
      requests:
        cpu: 128m
        memory: 256Mi
    externalSecret:
      enabled: false
