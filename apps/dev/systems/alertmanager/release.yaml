apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alertmanager
  namespace: flux-system
spec:
  values:
    image:
      tag: "v0.33.1"
    persistence:
      enabled: false
    extraSecretMounts:
      - name: alertmanager-secrets
        mountPath: /etc/alertmanager/secrets
        secretName: alertmanager-secrets
        readOnly: true
    config:
      enabled: true
      global:
        resolve_timeout: 5m
      templates:
        - "/etc/alertmanager/*.tmpl"
      receivers:
        - name: slack-resolved
          slack_configs:
            - channel: "#alerting_dev"
              send_resolved: true
              api_url_file: /etc/alertmanager/secrets/slack-api-url
              color: '{{ template "slack.color" . }}'
              title: '{{ template "slack.title" . }}'
              text: '{{ template "slack.text" . }}'

        - name: "null"

        - name: devops-ai-agent
          webhook_configs:
            - url: http://devops-ai-agent.devops-tools:3000/alert
              send_resolved: false

      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: devops-ai-agent
        routes:
          - matchers:
              - alertstate = "resolved"
            receiver: slack-resolved
            continue: false