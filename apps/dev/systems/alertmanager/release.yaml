apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alertmanager
  namespace: flux-system
spec:
  values:
    image:
      repository: quay.io/prometheus/alertmanager
      tag: "v0.28.1"
    nameOverride: "alertmanager"
    fullnameOverride: "alertmanager"
    resources:
      requests:
        memory: 50Mi
        cpu: 50m
      limits:
        memory: 200Mi
        cpu: 200m
    persistence:
      enabled: false
    extraSecretMounts:
      - name: alertmanager-secrets
        mountPath: /etc/alertmanager/secrets
        secretName: alertmanager-secrets
        readOnly: true
    config:
      enabled: true
      global:
        resolve_timeout: 5m
      templates:
        - "/etc/alertmanager/*.tmpl"
      receivers:
        - name: slack-resolved
          slack_configs:
            - channel: "#alerting_dev"
              send_resolved: true
              api_url_file: /etc/alertmanager/secrets/slack-api-url
              color: '{{ template "slack.color" . }}'
              title: '{{ template "slack.title" . }}'
              text: '{{ template "slack.text" . }}'

        - name: "null"

        - name: devops-ai-agent
          webhook_configs:
            - url: http://devops-ai-agent.devops-tools:3000/alert
              send_resolved: false

      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: devops-ai-agent
        routes:
          - matchers:
              - alertstate = "resolved"
            receiver: slack-resolved
            continue: false
    templates:
      alertmanager.tmpl: |-
        {{/* Alertmanager Silence link */}}
        {{ define "__alert_silence_link" -}}
            {{ .ExternalURL }}/#/silences/new?filter=%7B
            {{- range .CommonLabels.SortedPairs -}}
                {{- if ne .Name "alertname" -}}
                    {{- .Name }}%3D"{{- .Value -}}"%2C%20
                {{- end -}}
            {{- end -}}
            alertname%3D"{{- .CommonLabels.alertname -}}"%7D
        {{- end }}

        {{/* Severity of the alert */}}
        {{ define "__alert_severity" -}}
            {{- if eq .CommonLabels.severity "critical" -}}
            *Severity:* :alert: `Critical` :alert:
            {{- else if eq .CommonLabels.severity "warning" -}}
            *Severity:* :this-is-fine-fire: `Warning` :this-is-fine-fire:
            {{- else if eq .CommonLabels.severity "info" -}}
            *Severity:* :what: `Info` :what: 
            {{- else if eq .CommonLabels.severity "sqs" -}}
            *Severity:* :this-is-fine-fire: `AWS SQS Alert !!!` :this-is-fine-fire:
            {{- else -}}
            *Severity:* :question: {{ .CommonLabels.severity }}
            {{- end }}
        {{- end }}

        {{/* Title of the Slack alert */}}
        {{ define "slack.title" -}}
          [{{ .Status | toUpper -}}
          {{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{- end -}}
          ] {{ .CommonLabels.alertname }}
        {{- end }}


        {{/* Color of Slack attachment (appears as line next to alert )*/}}
        {{ define "slack.color" -}}
            {{ if eq .Status "firing" -}}
                {{ if eq .CommonLabels.severity "warning" -}}
                    warning
                {{- else if eq .CommonLabels.severity "critical" -}}
                    danger
                {{- else if eq .CommonLabels.severity "sqs" -}}
                    danger
                {{- else -}}
                    #439FE0
                {{- end -}}
            {{ else -}}
            good
            {{- end }}
        {{- end }}

        {{/* The text to display in the alert */}}
        {{ define "slack.text" -}}

            {{ template "__alert_severity" . }}
            {{- if (index .Alerts 0).Annotations.summary }}
            {{- "\n" -}}
            *Summary:* {{ (index .Alerts 0).Annotations.summary }}
            {{- end }}

            {{ range .Alerts }}

                {{- if .Annotations.description }}
                {{- "\n" -}}
                {{ .Annotations.description }}
                {{- "\n" -}}
                {{- end }}
                {{- if .Annotations.message }}
                {{- "\n" -}}
                {{ .Annotations.message }}
                {{- "\n" -}}
                {{- end }}

            {{- end }}

        {{- end }}
