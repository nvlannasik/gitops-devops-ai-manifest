apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  targetNamespace: monitoring
  chart:
    spec:
      chart: loki
      reconcileStrategy: Revision
      sourceRef:
        kind: HelmRepository
        name: grafana
      version: "18.5.0"
  interval: 5m0s
  install:
    remediation:
      retries: 3
    createNamespace: true
  values:
    nameOverride: "loki"
    fullnameOverride: "loki"
    deploymentMode: Monolithic

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      storage:
        type: filesystem

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      chunkStoreConfig:
        chunk_cache_config:
          embedded_cache:
            enabled: false

      queryRange:
        cache_results: false
        results_cache:
          cache:
            embedded_cache:
              enabled: false

      limits_config:
        retention_period: 168h
        ingestion_rate_mb: 4
        ingestion_burst_size_mb: 6

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 192Mi
        limits:
          cpu: 500m
          memory: 384Mi

    # Matikan komponen yang ga perlu di single binary mode
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # Matikan komponen tambahan yang berat & ga esensial untuk homelab
    gateway:
      enabled: false

    monitoring:
      serviceMonitor:
        enabled: false
      selfMonitoring:
        enabled: false
      lokiCanary:
        enabled: false

    test:
      enabled: false