apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release.yaml
configMapGenerator:
  - name: home-dashboards
    namespace: monitoring
    files:
      - dashboards/home/home-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Home"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/default"
  - name: generic-dashboards
    namespace: monitoring
    files:
      - dashboards/generic/node-exporter.json
      # - dashboards/generic/http-response.json
      - dashboards/generic/redis-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Generic"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/generic"
  ## SEPARATE BECAUSE CANT MORE THAN 1MB ON SINGLE CONFIGMAP
  - name: generic-dashboards-2
    namespace: monitoring
    files:
      - dashboards/generic/aws-sqs-dashboard.json
      - dashboards/generic/aws-cni-dashboard.json
      - dashboards/generic/cloudwatch-exporter-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Generic"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/generic-2"
  - name: kubernetes-dashboards
    namespace: monitoring
    files:
      - dashboards/kubernetes/kubernetes-cluster-overview.json
      - dashboards/kubernetes/kubernetes-cluster.json
      - dashboards/kubernetes/kubernetes-deployment.json
      - dashboards/kubernetes/kubernetes-pod-details.json
      - dashboards/kubernetes/external-secret-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Kubernetes"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/kubernetes"
  - name: logging-dashboards
    namespace: monitoring
    files:
      - dashboards/logging/loki-dash.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Logging"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/logging"
  - name: database-dashboards
    namespace: monitoring
    files:
      - dashboards/database/aws-rds-overview-prometheus-exporter-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Database"
        k8s-sidecar-target-directory: "/var/lib/grafana/dashboards/database"
