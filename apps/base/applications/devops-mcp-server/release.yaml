apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devops-mcp-server
  namespace: flux-app
spec:
  targetNamespace: devop-tools
  chart:
    spec:
      chart: main
      reconcileStrategy: Revision
      sourceRef:
        kind: HelmRepository
        name: github
        namespace: flux-system
  interval: 1m
  install:
    remediation:
      retries: 3
  values:
    nameOverride: devops-mcp-server
    fullnameOverride: devops-mcp-server
    commonLabels:
      app: devops-mcp-server
    image:
      repository: nvlannasik/devops-mcp-server
      registry: docker.io
    containerPorts:
      - name: main
        containerPort: 3000
    service:
      ports:
        - name: http
          port: 3000
          protocol: TCP
          targetPort: 3000
    kubeVersion: "1.33.0"
    commonAnnotations:
      configmap.reloader.stakater.com/reload: devops-mcp-server-external-secret
      secret.reloader.stakater.com/reload: devops-mcp-server-external-secret
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 256m
        memory: 512Mi
      requests:
        cpu: 128m
        memory: 256Mi
    externalSecret:
      enabled: false
    serviceAccount:
      create: true
      name: "devops-mcp-server"
      automountServiceAccountToken: true
